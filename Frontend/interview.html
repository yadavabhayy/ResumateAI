<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mock Interview</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎤 AI Mock Interview</h1>

    <div class="skill-box">

        <h3 id="questionNumber">
            Question 1 of 5
        </h3>

        <h3 id="timer">
             ⏳ 60s
        </h3>

        <p id="questionText">
            Loading...
        </p>

        <textarea
            id="answerBox"
            placeholder="Type your answer here..."
            rows="6">
        </textarea>

        <br><br>

        <button id="nextBtn">
            Next Question →
        </button>

    </div>

    <br>

    <a href="results.html" class="view-btn">
        ← Back to Dashboard
    </a>

</div>

<script src="interview.js"></script>

</body>
</html>
